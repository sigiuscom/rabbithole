name: CD

on:
  push:
    branches: [main]
    paths-ignore: ['charts/**', 'VERSION', '**/*.md']
  workflow_dispatch:
    inputs:
      level:
        description: 'Version bump level override'
        required: false
        type: string
        default: 'auto'

permissions:
  contents: write
  packages: write

jobs:
  cd:
    uses: sigiuscom/workflows/.github/workflows/cd.yml@b659600f83395155869ce3b3433b51675986c598  # main
    with:
      images: |
        [{"image":"ghcr.io/sigiuscom/rabbithole","context":".","dockerfile":"Dockerfile"}]
      level: ${{ inputs.level || 'auto' }}
    secrets: inherit
