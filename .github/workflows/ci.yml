name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  node:
    uses: sigiuscom/workflows/.github/workflows/node-app.yml@6095fb4fe57f438deb7d5491238e73260f5f0eb1
    with:
      package-manager: npm
      node-version: '24'
      lint-script: ''
      typecheck-cmd: npm run check:types
      run-tests: true
      run-build: true

  gitleaks:
    uses: sigiuscom/workflows/.github/workflows/gitleaks.yml@6095fb4fe57f438deb7d5491238e73260f5f0eb1

  helm:
    uses: sigiuscom/workflows/.github/workflows/helm-lint.yml@6095fb4fe57f438deb7d5491238e73260f5f0eb1
    with:
      charts-dir: charts
