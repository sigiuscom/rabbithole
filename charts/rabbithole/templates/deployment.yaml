apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbithole
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: rabbithole
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbithole
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabbithole
    spec:
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 3
            periodSeconds: 10
          resources: {{ .Values.resources | toJson }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
            - {name: cache, mountPath: /var/cache/nginx}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rabbithole
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: rabbithole
spec:
  clusterIP: {{ .Values.service.clusterIP }}
  selector:
    app.kubernetes.io/name: rabbithole
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
